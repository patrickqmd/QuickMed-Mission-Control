<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QuickMed Mission Control</title>
  <style>
    :root{--bg:#f4f6f1;--ink:#18201d;--line:#d9ded7;--field:#f7f8f5;--brand:#176b5b;--warn:#b65327;--urgent:#b3261e}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.45 system-ui,-apple-system,Segoe UI,sans-serif}button,input,select,textarea{font:inherit}textarea{min-height:96px}
    .app{min-height:100vh;display:grid;grid-template-columns:248px 1fr}.side{background:white;border-right:1px solid var(--line);padding:22px 14px;position:sticky;top:0;height:100vh}.brand{display:flex;gap:12px;align-items:center;margin:0 6px 22px}.mark{width:40px;height:40px;border-radius:6px;background:var(--brand);color:white;display:grid;place-items:center;font-weight:800}.nav button{width:100%;border:0;background:transparent;text-align:left;padding:10px 12px;border-radius:6px;font-weight:750;color:#56605b;cursor:pointer}.nav button:hover,.nav button.active{background:var(--field);color:var(--ink)}
    main{padding:26px;min-width:0}.top{display:flex;justify-content:space-between;gap:16px;align-items:end;margin-bottom:18px}.eyebrow{text-transform:uppercase;font-size:12px;font-weight:800;color:#778078}.title{font-size:30px;font-weight:850}.grid{display:grid;gap:14px}.cols2{grid-template-columns:1.5fr .9fr}.cols4{grid-template-columns:repeat(4,1fr)}.board{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.panel{background:white;border:1px solid var(--line);border-radius:6px;padding:16px;box-shadow:0 10px 30px #18201d12}.card{background:var(--field);border:1px solid var(--line);border-radius:6px;padding:12px;margin-bottom:10px}.column{min-height:360px;background:white;border:1px solid var(--line);border-radius:6px;padding:12px}.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.between{display:flex;justify-content:space-between;gap:12px}.badge{display:inline-flex;border:1px solid var(--line);background:var(--field);border-radius:5px;padding:4px 7px;font-size:12px;font-weight:800}.urgent{border-color:#b3261e44;background:#b3261e14;color:var(--urgent)}.high{border-color:#b6532744;background:#b6532714;color:var(--warn)}.brandb{border-color:#176b5b44;background:#176b5b14;color:var(--brand)}
    input,select,textarea{width:100%;border:1px solid var(--line);background:var(--field);border-radius:6px;padding:9px;outline:none}.form{display:grid;gap:10px}.twocol{display:grid;grid-template-columns:1fr 1fr;gap:10px}.primary{border:0;border-radius:6px;background:var(--brand);color:white;padding:10px 12px;font-weight:800;cursor:pointer}.secondary{border:1px solid var(--line);border-radius:6px;background:white;padding:9px 12px;font-weight:800;cursor:pointer}.task{cursor:grab}.task.dragging{opacity:.45}.muted{color:#68736d}.small{font-size:12px}.pre{white-space:pre-wrap;background:var(--field);border-radius:6px;padding:12px}.link{color:var(--brand);font-weight:800;cursor:pointer}
    @media(max-width:1000px){.app{display:block}.side{height:auto;position:static;border-right:0;border-bottom:1px solid var(--line)}.nav{display:flex;overflow:auto}.nav button{white-space:nowrap}.cols2,.cols4,.board,.twocol{grid-template-columns:1fr}.top{display:block}}
  </style>
</head>
<body>
<div class="app"><aside class="side"><div class="brand"><div class="mark">QM</div><div><strong>QuickMed</strong><div class="small muted">Mission Control</div></div></div><div class="nav" id="nav"></div></aside><main><div id="app"></div></main></div>
<script>
const STATUSES=["Not Started","In Progress","Blocked","Complete"],PRIORITIES=["Urgent","High","Normal","Low"],ENTITIES=["QuickMed Diagnostics","Praesidium Diagnostics","Sameday Health","Sameday Testing","Sameday Technologies","Signal Diagnostics","Flow Health","Other"],MATTER_TYPES=["AOB recovery","insurer reimbursement","litigation","software build","counsel request","operations","business development"],EVIDENCE_STATUSES=["Missing","Requested","Received","Reviewed","Not Available"],DRAFT_TYPES=["counsel email","patient outreach","insurer follow-up","settlement summary","timeline","issue list","evidence packet summary","Codex build brief","product idea","prompt/playbook"];
const seed={workstreams:[["ws-aob","QuickMed AOB recoveries","Assignment-of-benefits recovery files, evidence packets, patient outreach, and insurer-paid funds follow-up.","Urgent","#176b5b"],["ws-insurer","Insurer reimbursement","Claims-data work, payment trails, reimbursement disputes, and payer follow-up.","High","#2f6f9f"],["ws-counsel","Counsel / litigation","Counsel requests, litigation follow-up, limitations analysis, strategy notes, and issue lists.","High","#6f4e9f"],["ws-signal","Signal / Flow Health","Signal Diagnostics and Flow Health matters requiring separate entity tracking and follow-up.","Normal","#59714a"],["ws-software","Software build","Codex-ready specs, build queue, product ideas, local tools, and shipped software notes.","High","#9b5d22"],["ws-admin","Admin / operations","Internal operating tasks, process cleanup, records, and company administration.","Normal","#686f76"],["ws-bizdev","Business development","Opportunity tracking, partner follow-up, and relationship-building work.","Normal","#ad6a5a"]].map(x=>({id:x[0],name:x[1],description:x[2],priority:x[3],color:x[4],status:"Active"})),matters:[{id:"mat-aob-template",name:"AOB recovery file intake template",type:"AOB recovery",entity:"QuickMed Diagnostics",status:"Active",priority:"Urgent",workstreamId:"ws-aob",owner:"Patrick",summary:"Template matter for tracking AOB recovery files. Patient balance remains $0; dispute concerns insurer-paid funds allegedly retained despite AOB language.",nextAction:"Fill evidence checklist for first active files.",blockedReason:"Waiting on initial claim/check data imports."}],tasks:[{id:"task-evidence-packet",title:"Build first active AOB evidence packet",description:"Use the evidence-gap list as the packet checklist. Keep patient balance language precise.",status:"In Progress",priority:"Urgent",dueDate:"2026-06-19",tags:"evidence,AOB,packet",sortOrder:1,blocked:false,blockedReason:"",workstreamId:"ws-aob",matterId:"mat-aob-template",archived:false},{id:"task-limitations",title:"Confirm limitations date fields for recovery files",description:"Separate service, billing, check issue, receipt, cashing/deposit, discovery, outreach, and filing dates.",status:"Blocked",priority:"High",dueDate:"2026-06-20",tags:"limitations,counsel",sortOrder:1,blocked:true,blockedReason:"Need counsel review of preferred date taxonomy.",workstreamId:"ws-counsel",matterId:"mat-aob-template",archived:false}],notes:[{id:"note-aob-guardrail",title:"AOB framing guardrail",body:"For QuickMed AOB matters, do not imply ordinary patient medical debt. The working position is patient balance remains $0; the dispute concerns insurer-paid funds allegedly issued to and retained by the patient despite assignment-of-benefits language.",tags:"AOB,language,guardrail",matterId:"mat-aob-template",taskId:""}],evidenceGaps:[{id:"gap-intake-proof",matterId:"mat-aob-template",label:"AOB / intake proof and timestamp",description:"Attach intake proof showing assignment language and timing.",status:"Missing",source:"Intake records",nextAction:"Locate intake packet and timestamp export."},{id:"gap-check-dates",matterId:"mat-aob-template",label:"Check issue and cashing dates",description:"Keep check issue, receipt, and deposit/cashing dates separate for limitations analysis.",status:"Requested",source:"Claims/payment trail",nextAction:"Request payer ledger or portal screenshot."},{id:"gap-outreach",matterId:"mat-aob-template",label:"Outreach history",description:"Calls, emails, letters, and any response history.",status:"Missing",source:"Internal notes",nextAction:"Collect prior outreach log."}],drafts:[{id:"draft-packet-generator",title:"Codex build brief: evidence packet generator",type:"Codex build brief",body:"Build a local tool that takes a matter, renders an evidence checklist, and exports a packet summary with missing/requested/received evidence grouped by source.",tags:"codex,software,evidence",matterId:"",workstreamId:"ws-software"},{id:"draft-limitations-email",title:"Counsel email: limitations date taxonomy",type:"counsel email",body:"Draft request for counsel to confirm which dates should be captured and how to preserve issue-specific limitations analysis across QuickMed AOB recovery files.",tags:"counsel,limitations,AOB",matterId:"mat-aob-template",workstreamId:"ws-counsel"}]};
let state=JSON.parse(localStorage.qmMissionControl||"null")||seed,view="dashboard";const $=s=>document.querySelector(s),esc=(v="")=>String(v).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])),save=()=>localStorage.qmMissionControl=JSON.stringify(state),uid=p=>p+"-"+Date.now().toString(36)+"-"+Math.random().toString(36).slice(2,7),ws=id=>state.workstreams.find(x=>x.id===id)||{},mat=id=>state.matters.find(x=>x.id===id);
function badge(v){let c=v==="Urgent"?"urgent":v==="High"||v==="Blocked"||v==="Missing"?"high":"brandb";return '<span class="badge '+c+'">'+esc(v)+'</span>'}function header(t,e){return '<div class="top"><div><div class="eyebrow">'+e+'</div><div class="title">'+t+'</div></div></div>'}function obj(f){return Object.fromEntries(new FormData(f).entries())}function up(){save();renderNav();render()}
function renderNav(){let items=[["dashboard","Dashboard"],["tasks","Tasks"],["matters","Matters"],["notes","Notes"],["drafts","Drafts"],["settings","Settings"]];$("#nav").innerHTML=items.map(i=>'<button data-view="'+i[0]+'" class="'+(view===i[0]?"active":"")+'">'+i[1]+"</button>").join("");document.querySelectorAll("[data-view]").forEach(b=>b.onclick=()=>{view=b.dataset.view;renderNav();render()})}
function taskForm(t={}){return '<form class="form" onsubmit="saveTask(event,\\x27'+(t.id||"")+'\\x27)"><input name="title" placeholder="Task title" value="'+esc(t.title||"")+'" required><textarea name="description" placeholder="Description">'+esc(t.description||"")+'</textarea><div class="twocol"><select name="status">'+STATUSES.map(x=>'<option '+(x===(t.status||"Not Started")?"selected":"")+">"+x+"</option>").join("")+'</select><select name="priority">'+PRIORITIES.map(x=>'<option '+(x===(t.priority||"Normal")?"selected":"")+">"+x+"</option>").join("")+'</select></div><div class="twocol"><select name="workstreamId">'+state.workstreams.map(x=>'<option value="'+x.id+'" '+(x.id===(t.workstreamId||state.workstreams[0]?.id)?"selected":"")+">"+esc(x.name)+"</option>").join("")+'</select><select name="matterId"><option value="">No matter</option>'+state.matters.map(x=>'<option value="'+x.id+'" '+(x.id===t.matterId?"selected":"")+">"+esc(x.name)+"</option>").join("")+'</select></div><div class="twocol"><input type="date" name="dueDate" value="'+esc(t.dueDate||"")+'"><input name="tags" placeholder="tags" value="'+esc(t.tags||"")+'"></div><input name="blockedReason" placeholder="Blocked reason" value="'+esc(t.blockedReason||"")+'"><button class="primary">Save Task</button></form>'}
function saveTask(e,id){e.preventDefault();let b=obj(e.target);b.blocked=b.status==="Blocked"||!!b.blockedReason;if(id){state.tasks=state.tasks.map(t=>t.id===id?{...t,...b}:t)}else state.tasks.push({id:uid("task"),sortOrder:state.tasks.filter(t=>t.status===b.status).length+1,archived:false,tags:"",...b});up()}
function taskCard(t){let m=mat(t.matterId);return '<div class="card task" draggable="true" data-id="'+t.id+'"><div class="row">'+badge(t.priority)+badge(t.status)+(t.blocked?badge("Blocked"):"")+'</div><h3>'+esc(t.title)+'</h3><p class="muted">'+esc(t.description||"")+'</p><div class="row small"><span class="badge">'+esc(ws(t.workstreamId).name||"")+"</span>"+(m?'<span class="badge">'+esc(m.name)+"</span>":"")+'<span class="badge">'+esc(t.dueDate||"No date")+"</span></div>"+(t.blockedReason?'<p class="card high">'+esc(t.blockedReason)+"</p>":"")+'<details><summary class="link">Edit</summary>'+taskForm(t)+"</details></div>"}
function dashboard(){let active=state.tasks.filter(t=>!t.archived&&t.status!=="Complete").slice(0,8),blocked=state.matters.filter(m=>m.status==="Blocked"||m.blockedReason),gaps=state.evidenceGaps.filter(g=>["Missing","Requested"].includes(g.status));return header("Mission Control","Today")+'<div class="grid cols2"><section class="panel"><h2>Priority Tasks</h2>'+active.map(taskCard).join("")+'</section><section class="panel"><h2>Quick Create Task</h2>'+taskForm()+'</section></div><div class="grid cols4" style="margin-top:14px"><section class="panel"><h2>Status Counts</h2>'+STATUSES.map(s=>'<div class="between card"><span>'+s+"</span><b>"+state.tasks.filter(t=>!t.archived&&t.status===s).length+"</b></div>").join("")+'</section><section class="panel"><h2>Blocked Matters</h2>'+blocked.map(m=>'<div class="card"><b>'+esc(m.name)+'</b><p class="muted">'+esc(m.blockedReason||m.status)+"</p></div>").join("")+'</section><section class="panel"><h2>Evidence Gaps</h2>'+gaps.map(g=>'<div class="card"><div class="between"><b>'+esc(g.label)+"</b>"+badge(g.status)+'</div><p class="muted">'+esc(mat(g.matterId)?.name||"")+"</p></div>").join("")+'</section><section class="panel"><h2>Codex Queue</h2>'+state.drafts.slice(0,5).map(d=>'<div class="card"><b>'+esc(d.title)+'</b><p class="muted">'+esc(d.type)+"</p></div>").join("")+"</section></div>"}
function tasks(){setTimeout(bindDrag);return header("Task Board","Execution")+'<details class="panel"><summary class="link">Create task</summary>'+taskForm()+'</details><div class="board" style="margin-top:14px">'+STATUSES.map(s=>'<section class="column" data-status="'+s+'"><div class="between"><b>'+s+'</b><span class="badge">'+state.tasks.filter(t=>!t.archived&&t.status===s).length+"</span></div>"+state.tasks.filter(t=>!t.archived&&t.status===s).sort((a,b)=>a.sortOrder-b.sortOrder).map(taskCard).join("")+"</section>").join("")+"</div>"}
function bindDrag(){document.querySelectorAll(".task").forEach(el=>{el.ondragstart=e=>{e.dataTransfer.setData("text/plain",el.dataset.id);el.classList.add("dragging")};el.ondragend=()=>el.classList.remove("dragging")});document.querySelectorAll(".column").forEach(col=>{col.ondragover=e=>e.preventDefault();col.ondrop=e=>{e.preventDefault();let id=e.dataTransfer.getData("text/plain");state.tasks=state.tasks.map(t=>t.id===id?{...t,status:col.dataset.status,blocked:col.dataset.status==="Blocked"||t.blocked}:t);up()}})}
function evidenceFor(id){let gaps=state.evidenceGaps.filter(g=>g.matterId===id);return '<h4>Evidence Gaps</h4>'+gaps.map(g=>'<div class="card"><div class="between"><b>'+esc(g.label)+"</b>"+badge(g.status)+'</div><p>'+esc(g.description)+'</p><select onchange="state.evidenceGaps=state.evidenceGaps.map(g=>g.id===\\x27'+g.id+'\\x27?{...g,status:this.value}:g);up()">'+EVIDENCE_STATUSES.map(s=>'<option '+(s===g.status?"selected":"")+">"+s+"</option>").join("")+"</select></div>").join("")+'<form class="form" onsubmit="event.preventDefault();let b=obj(this);b.id=uid(\\x27gap\\x27);b.matterId=\\x27'+id+'\\x27;b.status=\\x27Missing\\x27;state.evidenceGaps.push(b);up()"><input name="label" placeholder="Evidence item"><input name="source" placeholder="Source"><input name="nextAction" placeholder="Next action"><button class="secondary">Add Gap</button></form>'}
function matterForm(){return '<form class="form" onsubmit="event.preventDefault();state.matters.push({id:uid(\\x27mat\\x27),status:\\x27Active\\x27,priority:\\x27Normal\\x27,owner:\\x27Patrick\\x27,blockedReason:\\x27\\x27,...obj(this)});up()"><input name="name" placeholder="Matter name" required><div class="twocol"><select name="type">'+MATTER_TYPES.map(x=>"<option>"+x+"</option>").join("")+'</select><select name="entity">'+ENTITIES.map(x=>"<option>"+x+"</option>").join("")+'</select></div><select name="workstreamId">'+state.workstreams.map(x=>'<option value="'+x.id+'">'+esc(x.name)+"</option>").join("")+'</select><textarea name="summary" placeholder="Summary"></textarea><input name="nextAction" placeholder="Next action"><button class="primary">Create Matter</button></form>'}
function matters(){return header("Matters","Workstreams and files")+'<div class="grid cols2"><section class="panel">'+state.matters.map(m=>'<div class="card"><div class="row">'+badge(m.priority)+badge(m.status)+'<span class="badge">'+esc(m.entity)+'</span></div><h3>'+esc(m.name)+'</h3><p>'+esc(m.summary)+'</p><p class="muted"><b>Next:</b> '+esc(m.nextAction)+"</p>"+evidenceFor(m.id)+"</div>").join("")+'</section><section class="panel"><h2>Create Matter</h2>'+matterForm()+"</section></div>"}
function notes(){return header("Notes","Calls, summaries, strategy")+'<div class="grid cols2"><section>'+state.notes.map(n=>'<article class="panel" style="margin-bottom:12px"><h3>'+esc(n.title)+"</h3><p>"+esc(n.body)+'</p><p class="muted">'+esc(n.tags)+"</p></article>").join("")+'</section><section class="panel"><h2>Add Note</h2><form class="form" onsubmit="event.preventDefault();state.notes.unshift({id:uid(\\x27note\\x27),...obj(this)});up()"><input name="title" placeholder="Note title"><textarea name="body" placeholder="Note body"></textarea><select name="matterId"><option value="">No matter</option>'+state.matters.map(m=>'<option value="'+m.id+'">'+esc(m.name)+"</option>").join("")+'</select><input name="tags" placeholder="tags"><button class="primary">Add Note</button></form></section></div>'}
function drafts(){return header("Drafts and Build Specs","Plain text library")+'<div class="grid cols2"><section>'+state.drafts.map(d=>'<article class="panel" style="margin-bottom:12px"><div class="row">'+badge(d.type)+"</div><h3>"+esc(d.title)+'</h3><div class="pre">'+esc(d.body)+'</div><p class="muted">'+esc(d.tags)+"</p></article>").join("")+'</section><section class="panel"><h2>Save Draft or Spec</h2><form class="form" onsubmit="event.preventDefault();state.drafts.unshift({id:uid(\\x27draft\\x27),...obj(this)});up()"><input name="title" placeholder="Title"><select name="type">'+DRAFT_TYPES.map(t=>"<option>"+t+"</option>").join("")+'</select><textarea name="body" placeholder="Plain text or Markdown"></textarea><input name="tags" placeholder="tags"><button class="primary">Save Draft</button></form></section></div>'}
function settings(){return header("Settings","Local defaults")+'<section class="panel"><h2>Workstreams</h2>'+state.workstreams.map(w=>'<div class="card"><div class="row"><span style="background:'+w.color+';width:12px;height:12px;border-radius:3px"></span><b>'+esc(w.name)+"</b>"+badge(w.priority)+"</div><p>"+esc(w.description)+"</p></div>").join("")+'</section><section class="panel" style="margin-top:14px"><h2>AOB Matter Guardrail</h2><p>QuickMed AOB matters should not be framed as ordinary patient medical debt. The patient balance remains $0; the dispute concerns insurer-paid funds allegedly issued to and retained by the patient despite assignment-of-benefits language.</p><button class="secondary" onclick="localStorage.removeItem(\\x27qmMissionControl\\x27);state=seed;up()">Reset Local Data</button></section>'}
function render(){document.querySelector("#app").innerHTML={dashboard,tasks,matters,notes,drafts,settings}[view]()}renderNav();render();
</script>
</body>
</html>
